<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha Pokémon – Aionia Dex</title>
  <link rel="stylesheet" href="style.css">
  <script src="data.js"></script>
</head>
<body>
  <main class="pokemon-page">
    <a class="back" href="index.html">← Volver a la Dex</a>

    <section class="pokemon-sheet">
      <div class="pokemon-left">
        <div class="pokemon-number" id="pokemonNumber"></div>
        <h1 id="pokemonName"></h1>
        <div id="pokemonTypes" class="chips"></div>
        <h2 id="pokemonDefinition"></h2>

        <section class="panel">
          <h3>Biología</h3>
          <p id="pokemonDex"></p>
        </section>

        <section class="panel">
          <h3>Stats base</h3>
          <div id="pokemonStats" class="stats-list"></div>
        </section>

        <section class="panel" id="factsPanel">
          <h3>Curiosidades</h3>
          <p id="pokemonFacts"></p>
        </section>

        <section class="panel" id="evolutionPanel">
          <h3>Línea evolutiva</h3>
          <div id="pokemonEvolutionLine" class="evolution-line"></div>
        </section>

        <section class="panel muted-panel">
          <h3>Área / Hábitat</h3>
          <p>Próximamente</p>
        </section>
      </div>

      <aside class="pokemon-right">
        <div class="pokemon-image-box">
          <button class="form-arrow form-prev" id="prevForm" type="button" aria-label="Forma anterior">‹</button>
          <img id="pokemonImg" alt="Imagen Pokémon">
          <button class="form-arrow form-next" id="nextForm" type="button" aria-label="Forma siguiente">›</button>
        </div>

        <div class="form-selector" id="formSelector">
          <div class="form-label">Forma</div>
          <div class="form-name" id="formName"></div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = Number(params.get("id"));
    const pokemon = POKEMON.find(p => p.id === id);

    function typeClass(t) {
      return 'type-' + String(t || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, '');
    }

    function getPokemonForms(p) {
      const forms = Array.isArray(p?.forms)
        ? p.forms.filter(f => f && f.image)
        : [];

      if (forms.length) {
        return forms;
      }

      return [
        {
          name: "Normal",
          image: p?.image || "assets/img/_placeholder.png"
        }
      ];
    }

    function getDisplayImage(p) {
      return getPokemonForms(p)[0]?.image || p?.image || "assets/img/_placeholder.png";
    }

    if (!pokemon) {
      document.body.innerHTML = `
        <main class="pokemon-page">
          <a class="back" href="index.html">← Volver a la Dex</a>
          <h1>Pokémon no encontrado</h1>
        </main>`;
    } else {
      document.title = `#${String(pokemon.id).padStart(3, "0")} ${pokemon.name} – Aionia Dex`;

      document.getElementById("pokemonNumber").textContent = `#${String(pokemon.id).padStart(3, "0")}`;
      document.getElementById("pokemonName").textContent = pokemon.name;
      document.getElementById("pokemonDefinition").textContent = pokemon.definition || "";
      document.getElementById("pokemonDex").textContent = pokemon.dex_draft || "—";

      const img = document.getElementById("pokemonImg");
      const formSelector = document.getElementById("formSelector");
      const formName = document.getElementById("formName");
      const prevForm = document.getElementById("prevForm");
      const nextForm = document.getElementById("nextForm");

      const forms = getPokemonForms(pokemon);
      let currentFormIndex = 0;

      function renderForm() {
        const form = forms[currentFormIndex];

        img.src = form.image;
        img.alt = `${pokemon.name} - ${form.name}`;
        formName.textContent = form.name || "Normal";

        const hasMultipleForms = forms.length > 1;
        formSelector.style.display = hasMultipleForms ? "" : "none";
        prevForm.style.display = hasMultipleForms ? "" : "none";
        nextForm.style.display = hasMultipleForms ? "" : "none";
      }

      img.onerror = () => img.src = "assets/img/_placeholder.png";

      prevForm.addEventListener("click", () => {
        currentFormIndex = (currentFormIndex - 1 + forms.length) % forms.length;
        renderForm();
      });

      nextForm.addEventListener("click", () => {
        currentFormIndex = (currentFormIndex + 1) % forms.length;
        renderForm();
      });

      renderForm();

      const typesBox = document.getElementById("pokemonTypes");
      const types = Array.isArray(pokemon.types) ? pokemon.types : [];

      types.forEach(type => {
        const span = document.createElement("span");
        span.className = `chip ${typeClass(type)}`;
        span.textContent = type;
        typesBox.appendChild(span);
      });

      const facts = (pokemon.curiosidades || "").trim();

      if (facts && facts.toLowerCase() !== "nan") {
        document.getElementById("pokemonFacts").textContent = facts;
      } else {
        document.getElementById("factsPanel").style.display = "none";
      }

      const statsBox = document.getElementById("pokemonStats");

      const labels = {
        hp: "PS",
        atk: "Ataque",
        def: "Defensa",
        spa: "At. Esp.",
        spd: "Def. Esp.",
        spe: "Velocidad"
      };

      Object.entries(labels).forEach(([key, label]) => {
        const value = Number(pokemon.stats?.[key] ?? 0);
        const width = Math.min((value / 150) * 100, 100);

        statsBox.innerHTML += `
          <div class="stat-row">
            <span class="stat-name">${label}</span>
            <span class="stat-value">${value}</span>
            <div class="stat-bar">
              <div class="stat-fill" style="width:${width}%"></div>
            </div>
          </div>`;
      });

      const evoBox = document.getElementById("pokemonEvolutionLine");
      const evoPanel = document.getElementById("evolutionPanel");

      const evoIds = Array.isArray(pokemon.evolutionLine) ? pokemon.evolutionLine : [];

      const evoPokemon = evoIds
        .map(evoId => POKEMON.find(p => p.id === evoId))
        .filter(Boolean);

      if (evoPokemon.length) {
        evoBox.innerHTML = evoPokemon.map((p, index) => {
          const arrow = index < evoPokemon.length - 1
            ? `<span class="evo-arrow">→</span>`
            : "";

          return `
            <a class="evo-card" href="pokemon.html?id=${p.id}">
              <img src="${getDisplayImage(p)}" alt="${p.name}" onerror="this.src='assets/img/_placeholder.png'">
              <span>#${String(p.id).padStart(3, "0")}</span>
              <strong>${p.name}</strong>
            </a>
            ${arrow}
          `;
        }).join("");
      } else {
        evoPanel.style.display = "none";
      }
    }
  </script>
</body>
</html>
